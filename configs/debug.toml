# Quick smoke test config — 2 epochs, small batch
# Used for checkpoint save/load verification

[project]
name = "anima-def-uavdetr"
codename = "DEF-UAVDETR"

[training]
batch_size = 4
learning_rate = 0.0001
epochs = 2
optimizer = "adamw"
weight_decay = 0.0001
scheduler = "cosine"
warmup_ratio = 0.05
precision = "fp16"
max_grad_norm = 1.0
seed = 42

[model]
num_classes = 1
num_queries = 300

[data]
image_size = 640
num_workers = 0

[checkpoint]
output_dir = "/tmp/def_uavdetr_debug_ckpt"
keep_top_k = 1
metric = "val_loss"

[early_stopping]
enabled = false
