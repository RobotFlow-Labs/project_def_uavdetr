# Round 3: Finetune on 261K unified_v2 superset (4x L4 DDP)
# Resume from best.pth of round 2

[project]
name = "anima-def-uavdetr"
codename = "DEF-UAVDETR"
round = 3
description = "Finetune on 261K unified_v2: all 7 datasets"

[training]
batch_size = 16                  # Per-GPU (effective = 64 with 4 GPUs)
learning_rate = 5e-6             # Lower LR for round 3
epochs = 20
optimizer = "adamw"
weight_decay = 1e-4
scheduler = "cosine"
warmup_ratio = 0.03
min_lr = 1e-7
precision = "fp16"
max_grad_norm = 1.0
seed = 42
num_gpus = 4

[data]
image_size = 640
num_workers = 2

[data.breakdown]
seraphim = 75134
birddrone = 145506
dut_anti_uav = 5200
dronevehicle_night = 10357
baidu_uav = 10286
visdrone = 8629
# scidb_tir = 1208 (no labels — excluded)

[data.total]
train = 255112
val = 6412
total = 261524

[checkpoint]
resume = "/mnt/artifacts-datai/checkpoints/project_def_uavdetr/best.pth"
output_dir = "/mnt/artifacts-datai/checkpoints/project_def_uavdetr"
keep_top_k = 2

[early_stopping]
enabled = true
patience = 8

[launch]
command = """
PYTHONUNBUFFERED=1 PYTHONPATH="" CUDA_VISIBLE_DEVICES=0,1,4,7 \
nohup .venv/bin/torchrun --nproc_per_node=4 --master_port=29509 \
    scripts/train_ddp.py \
    --epochs 20 --batch-size 16 --lr 5e-6 \
    --datasets unified \
    --resume /mnt/artifacts-datai/checkpoints/project_def_uavdetr/best.pth \
    --workers 2 --patience 8 \
    > /mnt/artifacts-datai/logs/project_def_uavdetr/train_ddp_r3.log 2>&1 &
disown
"""
